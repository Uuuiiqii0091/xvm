name: Parallel 1-5 (Getscreen.me)

on:
  workflow_dispatch:
    inputs:
      getscreen_email:
        description: 'Getscreen.me Account Email (Required)'
        required: true
        type: string
      device_1:
        description: 'Spawn Device 1?'
        required: false
        type: boolean
        default: true
      device_2:
        description: 'Spawn Device 2?'
        required: false
        type: boolean
        default: false
      device_3:
        description: 'Spawn Device 3?'
        required: false
        type: boolean
        default: false
      device_4:
        description: 'Spawn Device 4?'
        required: false
        type: boolean
        default: false
      device_5:
        description: 'Spawn Device 5?'
        required: false
        type: boolean
        default: false

jobs:
  # 1. This quick job checks your inputs and decides how many runners to make
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate Dynamic Matrix
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          D1: ${{ inputs.device_1 }}
          D2: ${{ inputs.device_2 }}
          D3: ${{ inputs.device_3 }}
          D4: ${{ inputs.device_4 }}
          D5: ${{ inputs.device_5 }}
        run: |
          import os, json
          
          email = os.environ.get("EMAIL", "").strip()
          
          # Map the boolean inputs
          devices = {
              "1": os.environ.get("D1") == "true",
              "2": os.environ.get("D2") == "true",
              "3": os.environ.get("D3") == "true",
              "4": os.environ.get("D4") == "true",
              "5": os.environ.get("D5") == "true"
          }
          
          # Only include devices that are checked
          includes =[]
          for dev, is_active in devices.items():
              if is_active and email:
                  includes.append({"device": dev, "email": email})
          
          matrix_output = {"include": includes}
          
          # Send the configuration to the next job
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix_output)}\n")

  # 2. This is the actual Remote Session job
  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix # Waits for the prepare_matrix job to finish
    runs-on: windows-latest
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      # Reads the exact number of runners needed from the first job
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      - name: Install and Start Getscreen.me
        shell: pwsh
        run: |
          Write-Host "Downloading Getscreen.me Agent..."
          Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi"
          
          # Give it a uniquely identifiable name for your dashboard
          $DeviceName = "$env:COMPUTERNAME-Dev${{ matrix.device }}"
          Write-Host "Installing and linking Getscreen.me for Device ${{ matrix.device }} ($DeviceName)..."
          
          # MSI Silent Install mapped via Console Configs
          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='$DeviceName' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs
          
          Write-Host "=============================================="
          Write-Host "✅ Getscreen.me is configured and running."
          Write-Host "   Registered Email: ${{ matrix.email }}"
          Write-Host "   Device Name:      $DeviceName"
          Write-Host "   Check your Getscreen.me Dashboard (https://getscreen.me/en/dashboard) to connect!"
          Write-Host "=============================================="
          
      - name: Keep Runner Alive
        if: always()
        shell: pwsh
        run: |
          Write-Host "Session is active. This runner will remain online until the job timeout is reached."
          Start-Sleep -Seconds 3600
