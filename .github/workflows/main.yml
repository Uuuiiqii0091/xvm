name: Parallel 1-5

on:
  workflow_dispatch:
    inputs:
      crd_code_1:
        description: 'CRD Auth Code for Device 1 (Required)'
        required: true
        type: string
      crd_code_2:
        description: 'CRD Auth Code for Device 2 (Optional)'
        required: false
        type: string
      crd_code_3:
        description: 'CRD Auth Code for Device 3 (Optional)'
        required: false
        type: string
      crd_code_4:
        description: 'CRD Auth Code for Device 4 (Optional)'
        required: false
        type: string
      crd_code_5:
        description: 'CRD Auth Code for Device 5 (Optional)'
        required: false
        type: string

jobs:
  # 1. This quick job checks your inputs and decides how many runners to make
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate Dynamic Matrix
        id: set-matrix
        shell: python
        env:
          CODE_1: ${{ inputs.crd_code_1 }}
          CODE_2: ${{ inputs.crd_code_2 }}
          CODE_3: ${{ inputs.crd_code_3 }}
          CODE_4: ${{ inputs.crd_code_4 }}
          CODE_5: ${{ inputs.crd_code_5 }}
        run: |
          import os, json
          
          # Map the inputs
          devices = {
              "1": os.environ.get("CODE_1", ""),
              "2": os.environ.get("CODE_2", ""),
              "3": os.environ.get("CODE_3", ""),
              "4": os.environ.get("CODE_4", ""),
              "5": os.environ.get("CODE_5", "")
          }
          
          # Only include devices that actually have an auth code pasted in
          includes =[]
          for dev, code in devices.items():
              if code.strip():
                  includes.append({"device": dev, "crd_code": code.strip()})
          
          matrix_output = {"include": includes}
          
          # Send the configuration to the next job
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix_output)}\n")

  # 2. This is the actual Remote Session job
  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix # Waits for the prepare_matrix job to finish
    runs-on: windows-latest
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      # Reads the exact number of runners needed from the first job
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      - name: Install and Start Chrome Remote Desktop
        shell: pwsh
        run: |
          Write-Host "Installing and configuring CRD for Device ${{ matrix.device }}..."
          
          Invoke-WebRequest -Uri "https://dl.google.com/dl/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "crd_host.msi"
          
          Start-Process msiexec.exe -Wait -ArgumentList '/i crd_host.msi /quiet'
          
          & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="${{ matrix.crd_code }}" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name="${{ env.COMPUTERNAME }}-${{ matrix.device }}" --pin="112233"
          
          Write-Host "=============================================="
          Write-Host "✅ Chrome Remote Desktop is configured."
          Write-Host "   Connect to: ${{ env.COMPUTERNAME }}-${{ matrix.device }}"
          Write-Host "   Access PIN: 112233"
          Write-Host "=============================================="
          
      - name: Keep Runner Alive
        if: always()
        shell: pwsh
        run: |
          Write-Host "Session is active. This runner will remain online until the job timeout is reached."
          Start-Sleep -Seconds 3600
