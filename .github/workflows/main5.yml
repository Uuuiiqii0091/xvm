name: Parallel 1-5 (DWService macOS + GoLogin)

on:
  workflow_dispatch:
    inputs:
      dw_auth_1:
        description: 'DWService Auth Code 1 (Required)[e.g., 123-456-789]'
        required: true
        type: string
      dw_auth_2:
        description: 'DWService Auth Code 2 (Optional)'
        required: false
        type: string
      dw_auth_3:
        description: 'DWService Auth Code 3 (Optional)'
        required: false
        type: string
      dw_auth_4:
        description: 'DWService Auth Code 4 (Optional)'
        required: false
        type: string
      dw_auth_5:
        description: 'DWService Auth Code 5 (Optional)'
        required: false
        type: string
      gologin_email:
        description: 'GoLogin Account Email (Required)'
        required: true
        type: string
      gologin_password:
        description: 'GoLogin Account Password (Required)'
        required: true
        type: string

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate Dynamic Matrix
        id: set-matrix
        shell: python
        env:
          DW_1: ${{ inputs.dw_auth_1 }}
          DW_2: ${{ inputs.dw_auth_2 }}
          DW_3: ${{ inputs.dw_auth_3 }}
          DW_4: ${{ inputs.dw_auth_4 }}
          DW_5: ${{ inputs.dw_auth_5 }}
        run: |
          import os, json, re
          devices = {
              "1": os.environ.get("DW_1", "").strip(),
              "2": os.environ.get("DW_2", "").strip(),
              "3": os.environ.get("DW_3", "").strip(),
              "4": os.environ.get("DW_4", "").strip(),
              "5": os.environ.get("DW_5", "").strip(),
          }
          includes =[]
          for dev, auth in devices.items():
              if auth:
                  # Smartly extract just the '123-456-789' code if user pasted extra text
                  code = auth
                  match = re.search(r'(\d{3}-\d{3}-\d{3})', auth)
                  if match:
                      code = match.group(1)
                  
                  includes.append({"device": dev, "dw_auth": code})
          
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")

  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: macos-14
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      - name: Setup GUI Authorization Credentials
        run: |
          echo "Creating 'admin' user with password 'admin'..."
          sudo sysadminctl -addUser admin -password admin -admin
          
          echo "Setting default runner password to 'admin' as well..."
          sudo sysadminctl -adminUser "$USER" -password admin
          
          echo "✅ Credentials configured. You can authorize macOS GUI prompts with Username: admin / Password: admin"

      - name: Install and Start DWService
        run: |
          echo "Downloading DWService Agent for macOS..."
          curl -L -o dwagent.sh "https://www.dwservice.net/download/dwagent.sh"
          
          echo "Installing DWService Silently..."
          sudo bash dwagent.sh -silent key="${{ matrix.dw_auth }}"
          
          echo "Bypassing macOS Screen Recording & Accessibility Prompts for DWService..."
          APP_PATH="/Library/DWAgent/native/DWAgentSvc.app"
          
          # Give DWService a few seconds to initialize directories
          sleep 5
          
          if[ -d "$APP_PATH" ]; then
              APP_BUNDLE_ID=$(defaults read "$APP_PATH/Contents/Info.plist" CFBundleIdentifier)
              echo "DWService Bundle ID located: $APP_BUNDLE_ID"
              
              sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true
              sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true
              
              echo "Restarting DWService daemon to apply permissions..."
              sudo killall DWAgentSvc || true
              sleep 3
          else
              echo "⚠️ DWService app not found at expected path. TCC bypass might fail."
          fi
          
          echo "✅ DWService is installed and online! Device Name: macOS-Runner-Dev${{ matrix.device }}"

      - name: Download, Install, and Open GoLogin
        run: |
          echo "Downloading GoLogin ARM64 for macOS..."
          curl -L -o gologin.dmg "https://dl.gologin.com/gologin-arm64.dmg"
          
          echo "Mounting GoLogin DMG..."
          hdiutil attach gologin.dmg -mountpoint /Volumes/gologin -nobrowse -quiet
          
          echo "Installing GoLogin to Applications..."
          sudo cp -R /Volumes/gologin/GoLogin.app /Applications/
          hdiutil detach /Volumes/gologin -quiet -force
          
          echo "Launching GoLogin..."
          open /Applications/GoLogin.app
          
          echo "✅ GoLogin installed and opened!"

      - name: Automate GoLogin Login (macOS Native)
        env:
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: ${{ inputs.gologin_password }}
        run: |
          echo "Waiting 15 seconds for GoLogin to load..."
          sleep 15
          
          echo "Automating keystrokes using AppleScript..."
          osascript <<'EOF'
          set userEmail to system attribute "GOLOGIN_EMAIL"
          set userPass to system attribute "GOLOGIN_PASSWORD"
          
          tell application "System Events"
              tell application "GoLogin" to activate
              delay 2
              
              # Press TAB 8 times to reach 'I already have an account Log in'
              repeat 8 times
                  key code 48 # Tab key
                  delay 0.5
              end repeat
              
              key code 36 # Enter key
              delay 4
              
              keystroke userEmail
              delay 0.5
              
              key code 48 # Tab key
              delay 0.5
              
              keystroke userPass
              delay 0.5
              
              key code 36 # Enter key
          end tell
          EOF
          
          echo "✅ Login automated successfully."

      - name: Keep Runner Alive
        if: always()
        run: |
          echo "Session is active. Connect via https://www.dwservice.net/"
          sleep 3600
