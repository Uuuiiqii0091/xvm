name: Parallel 1-5 (CRD macOS + GoLogin)

on:
  workflow_dispatch:
    inputs:
      crd_auth_1:
        description: 'CRD Auth Code 1 (Required)[Paste full command or 4/xxx code]'
        required: true
        type: string
      crd_auth_2:
        description: 'CRD Auth Code 2 (Optional)'
        required: false
        type: string
      crd_auth_3:
        description: 'CRD Auth Code 3 (Optional)'
        required: false
        type: string
      crd_auth_4:
        description: 'CRD Auth Code 4 (Optional)'
        required: false
        type: string
      crd_auth_5:
        description: 'CRD Auth Code 5 (Optional)'
        required: false
        type: string
      gologin_email:
        description: 'GoLogin Account Email (Required)'
        required: true
        type: string
      gologin_password:
        description: 'GoLogin Account Password (Required)'
        required: true
        type: string

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate Dynamic Matrix
        id: set-matrix
        shell: python
        env:
          CRD_1: ${{ inputs.crd_auth_1 }}
          CRD_2: ${{ inputs.crd_auth_2 }}
          CRD_3: ${{ inputs.crd_auth_3 }}
          CRD_4: ${{ inputs.crd_auth_4 }}
          CRD_5: ${{ inputs.crd_auth_5 }}
        run: |
          import os, json, re
          devices = {
              "1": os.environ.get("CRD_1", "").strip(),
              "2": os.environ.get("CRD_2", "").strip(),
              "3": os.environ.get("CRD_3", "").strip(),
              "4": os.environ.get("CRD_4", "").strip(),
              "5": os.environ.get("CRD_5", "").strip(),
          }
          includes =[]
          for dev, auth in devices.items():
              if auth:
                  # Smartly extract just the '4/xxx' code if user pasted the full Google command
                  code = auth
                  match_quotes = re.search(r'--code="(4/[^"]+)"', auth)
                  match_no_quotes = re.search(r'--code=(4/[^\s]+)', auth)
                  if match_quotes:
                      code = match_quotes.group(1)
                  elif match_no_quotes:
                      code = match_no_quotes.group(1)
                  
                  includes.append({"device": dev, "crd_auth": code})
          
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")

  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: macos-14
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      - name: Setup GUI Authorization Credentials
        run: |
          echo "Creating 'admin' user with password 'admin'..."
          sudo sysadminctl -addUser admin -password admin -admin
          
          echo "Setting default runner password to 'admin' as well..."
          sudo sysadminctl -adminUser "$USER" -password admin
          
          echo "✅ Credentials configured. You can authorize macOS GUI prompts with Username: admin / Password: admin"

      - name: Install and Start Chrome Remote Desktop
        run: |
          echo "Downloading Chrome Remote Desktop for macOS..."
          curl -L -o crd.dmg "https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg"
          
          echo "Mounting DMG..."
          hdiutil attach crd.dmg -mountpoint /Volumes/crd -nobrowse -quiet
          
          echo "Installing CRD Package..."
          sudo installer -pkg "/Volumes/crd/Chrome Remote Desktop Host.pkg" -target /
          hdiutil detach /Volumes/crd -quiet -force
          
          echo "Bypassing macOS Screen Recording & Accessibility Prompts for CRD..."
          for APP_BUNDLE_ID in "com.google.chrome.remote_desktop" "com.google.Chrome"; do
            sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true
            sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true
          done

          DeviceName="macOS-Runner-Dev${{ matrix.device }}"
          
          echo "Registering and Starting Chrome Remote Desktop Host ($DeviceName)..."
          # Standard CRD Host path on macOS. PIN is hardcoded to 112233
          sudo /Library/PrivilegedHelperTools/ChromeRemoteDesktopHost.app/Contents/MacOS/remoting_start_host --code="${{ matrix.crd_auth }}" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name="$DeviceName" --pin="112233"
          
          echo "✅ Chrome Remote Desktop is online and ready for connection."

      - name: Download, Install, and Open GoLogin
        run: |
          echo "Downloading GoLogin ARM64 for macOS..."
          curl -L -o gologin.dmg "https://dl.gologin.com/gologin-arm64.dmg"
          
          echo "Mounting GoLogin DMG..."
          hdiutil attach gologin.dmg -mountpoint /Volumes/gologin -nobrowse -quiet
          
          echo "Installing GoLogin to Applications..."
          sudo cp -R /Volumes/gologin/GoLogin.app /Applications/
          hdiutil detach /Volumes/gologin -quiet -force
          
          echo "Launching GoLogin..."
          open /Applications/GoLogin.app
          
          echo "✅ GoLogin installed and opened!"

      - name: Automate GoLogin Login (macOS Native)
        env:
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: ${{ inputs.gologin_password }}
        run: |
          echo "Waiting 15 seconds for GoLogin to load..."
          sleep 15
          
          echo "Automating keystrokes using AppleScript..."
          osascript <<'EOF'
          set userEmail to system attribute "GOLOGIN_EMAIL"
          set userPass to system attribute "GOLOGIN_PASSWORD"
          
          tell application "System Events"
              tell application "GoLogin" to activate
              delay 2
              
              # Press TAB 8 times to reach 'I already have an account Log in'
              repeat 8 times
                  key code 48 # Tab key
                  delay 0.5
              end repeat
              
              key code 36 # Enter key
              delay 4
              
              keystroke userEmail
              delay 0.5
              
              key code 48 # Tab key
              delay 0.5
              
              keystroke userPass
              delay 0.5
              
              key code 36 # Enter key
          end tell
          EOF
          
          echo "✅ Login automated successfully."

      - name: Keep Runner Alive
        if: always()
        run: |
          echo "Session is active. Connect via https://remotedesktop.google.com/access"
          sleep 3600
