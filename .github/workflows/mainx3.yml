name: Parallel 1-5 (CRD Windows + GoLogin)

on:
  workflow_dispatch:
    inputs:
      gologin_email:
        description: 'GoLogin Account Email (Required)'
        required: true
        type: string
      crd_code_1:
        description: 'CRD Auth Code/Command for Device 1'
        required: false
        type: string
      crd_code_2:
        description: 'CRD Auth Code/Command for Device 2'
        required: false
        type: string
      crd_code_3:
        description: 'CRD Auth Code/Command for Device 3'
        required: false
        type: string
      crd_code_4:
        description: 'CRD Auth Code/Command for Device 4'
        required: false
        type: string
      crd_code_5:
        description: 'CRD Auth Code/Command for Device 5'
        required: false
        type: string

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate Dynamic Matrix
        id: set-matrix
        shell: python
        env:
          C1: ${{ inputs.crd_code_1 }}
          C2: ${{ inputs.crd_code_2 }}
          C3: ${{ inputs.crd_code_3 }}
          C4: ${{ inputs.crd_code_4 }}
          C5: ${{ inputs.crd_code_5 }}
        run: |
          import os, json, re
          
          def extract_code(raw):
              if not raw: return ""
              # Automatically extracts the code if you paste the entire SSH setup command
              m = re.search(r'--code="([^"]+)"', raw)
              return m.group(1) if m else raw.strip()
              
          # Check which CRD codes were provided
          devices = {
            "1": extract_code(os.environ.get("C1")),
            "2": extract_code(os.environ.get("C2")),
            "3": extract_code(os.environ.get("C3")),
            "4": extract_code(os.environ.get("C4")),
            "5": extract_code(os.environ.get("C5"))
          }
          
          includes =[]
          for dev, code in devices.items():
              if code: # If a code exists, spawn the device
                  includes.append({"device": dev, "crd_code": code})
          
          if not includes:
              print("Error: No valid CRD codes provided. Exiting.")
              exit(1)
              
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")

  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: macos-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      - name: Set macOS User Password (runner:admin)
        run: |
          echo "Setting password for current user ('runner') to 'admin'..."
          sudo dscl . -passwd /Users/runner admin
          sudo dseditgroup -o edit -a runner -t user admin
          echo "✅ Local GUI password updated. Use Username 'runner' and Password 'admin' if prompted."

      - name: Prevent Sleep & Screen Lock
        run: |
          sudo pmset -a disablesleep 1
          sudo pmset -a displaysleep 0
          sudo pmset -a disksleep 0

      - name: Download and Install Chrome Remote Desktop
        run: |
          echo "Downloading Chrome Remote Desktop for macOS..."
          curl -L -o crd.dmg "https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg"
          
          echo "Mounting DMG..."
          hdiutil attach crd.dmg -mountpoint /Volumes/crd -nobrowse -quiet
          
          echo "Installing PKG..."
          sudo installer -pkg "/Volumes/crd/Chrome Remote Desktop Host.pkg" -target /
          hdiutil detach /Volumes/crd -quiet -force

      - name: Bypass macOS Security (Screen Recording & Accessibility)
        run: |
          echo "Bypassing macOS TCC prompts for CRD..."
          APP_BUNDLE_ID="com.google.ChromeRemoteDesktopHost"
          EXEC_PATH="/Library/PrivilegedHelperTools/Google/ChromeRemoteDesktop/ChromeRemoteDesktopHost.app/Contents/MacOS/remoting_host"
          
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true
          
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$EXEC_PATH', 1, 2, 4, 1, 0);" || true
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$EXEC_PATH', 1, 2, 4, 1, 0);" || true
          
          echo "✅ Screen Recording & Accessibility permissions granted to CRD!"

      - name: Start Chrome Remote Desktop Host
        env:
          CRD_CODE: ${{ matrix.crd_code }}
          CRD_PIN: "112233"
          DEVICE_NAME: "macOS-Runner-Dev${{ matrix.device }}"
        run: |
          echo "Configuring Chrome Remote Desktop..."
          START_HOST="/Library/PrivilegedHelperTools/Google/ChromeRemoteDesktop/ChromeRemoteDesktopHost.app/Contents/MacOS/remoting_start_host"
          
          if [ ! -f "$START_HOST" ]; then
            START_HOST=$(find /Library/PrivilegedHelperTools -name "remoting_start_host" 2>/dev/null | head -n 1)
          fi
          
          echo "Starting CRD with Device Name: $DEVICE_NAME"
          # Pass the PIN twice through stdin (CRD asks for PIN then confirmation)
          printf "%s\n%s\n" "$CRD_PIN" "$CRD_PIN" | "$START_HOST" --code="$CRD_CODE" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name="$DEVICE_NAME"
          
          echo "✅ Chrome Remote Desktop Setup Complete!"
          echo "👉 Go to https://remotedesktop.google.com/access to control this machine."

      - name: Download, Install, and Open GoLogin
        run: |
          echo "Downloading GoLogin ARM64 for macOS..."
          curl -L -o gologin.dmg "https://dl.gologin.com/gologin-arm64.dmg"
          
          echo "Mounting GoLogin DMG..."
          hdiutil attach gologin.dmg -mountpoint /Volumes/gologin -nobrowse -quiet
          
          echo "Installing GoLogin to Applications..."
          sudo cp -R /Volumes/gologin/GoLogin.app /Applications/
          hdiutil detach /Volumes/gologin -quiet -force
          
          echo "Launching GoLogin..."
          open /Applications/GoLogin.app
          
          echo "✅ GoLogin installed and opened!"

      - name: Automate GoLogin Login (macOS Native)
        env:
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          echo "Waiting 15 seconds for GoLogin to load..."
          sleep 15
          
          echo "Automating keystrokes using AppleScript..."
          osascript <<'EOF'
          set userEmail to system attribute "GOLOGIN_EMAIL"
          set userPass to system attribute "GOLOGIN_PASSWORD"
          
          tell application "System Events"
              tell application "GoLogin" to activate
              delay 2
              
              repeat 8 times
                  key code 48 # Tab key
                  delay 0.5
              end repeat
              
              key code 36 # Enter/Return key
              delay 4
              
              keystroke userEmail
              delay 0.5
              
              key code 48 # Tab
              delay 0.5
              
              keystroke userPass
              delay 0.5
              
              key code 36 # Enter
          end tell
          EOF
          
          echo "✅ Login automated successfully."

      - name: Keep Runner Alive
        if: always()
        run: |
          echo "============================================="
          echo "   Session is active and ready for access."
          echo "   Mac Username: runner"
          echo "   Mac Password: admin"
          echo "============================================="
          sleep 3600
